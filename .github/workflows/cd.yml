name: CD

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions to the configured package index
        required: true
        type: boolean
        default: false
      repository:
        description: Target package index for manual publishes
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dist:
    name: Distribution build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Build distributions and validate long description
        run: make ci-build

      - name: Smoke-test installed wheel
        run: make smoke-dist

      - uses: actions/upload-artifact@v7
        with:
          name: Packages
          path: dist/*

  publish:
    needs: [dist]
    name: Publish to PyPI
    environment:
      name: pypi
    permissions:
      id-token: write
      attestations: write
      contents: read
    runs-on: ubuntu-latest
    if: >-
      vars.PYPI_PUBLISH_ENABLED == 'true' && (
        (github.event_name == 'release' && github.event.action == 'published')
      ||
        (github.event_name == 'workflow_dispatch' && inputs.publish == true &&
        startsWith(github.ref, 'refs/tags/'))
      )

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: Packages
          path: dist

      - name: Generate artifact attestation for public releases
        if: github.event.repository.private == false
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish package distributions to TestPyPI
        if:
          github.event_name == 'workflow_dispatch' && inputs.repository ==
          'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish package distributions to PyPI
        if:
          github.event_name == 'release' || (github.event_name ==
          'workflow_dispatch' && inputs.repository == 'pypi')
        uses: pypa/gh-action-pypi-publish@release/v1
