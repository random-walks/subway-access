name: Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

jobs:
  tests:
    name: Optional tests on ${{ matrix.runs-on }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            python-version: "3.13"
          - runs-on: windows-latest
            python-version: "3.12"
          - runs-on: macos-latest
            python-version: "3.12"
          - runs-on: ubuntu-latest
            python-version: "pypy-3.11"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install uv

      - name: Install package
        run: python -m uv sync --group test

      - name: Run test suite
        run: python -m uv run pytest -ra
